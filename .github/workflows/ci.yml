name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit

      - name: Test
        run: npm test

      - name: Remove broken Microsoft apt repos
        run: |
          sudo find /etc/apt/sources.list.d/ \( -name "*.list" -o -name "*.sources" \) \
            -exec grep -l "packages.microsoft.com" {} \; \
            | xargs sudo rm -f 2>/dev/null || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
          CONTACT_TRUST_PROXY_IP_HEADERS: 'true'

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Remove broken Microsoft apt repos
        run: |
          sudo find /etc/apt/sources.list.d/ \( -name "*.list" -o -name "*.sources" \) \
            -exec grep -l "packages.microsoft.com" {} \; \
            | xargs sudo rm -f 2>/dev/null || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start server
        run: npm run start -- -p 3000 &
        env:
          CI: true

      - name: Wait for server
        run: npx wait-on http://127.0.0.1:3000 --timeout 120000

      - name: Warm up server
        run: |
          curl -sf http://127.0.0.1:3000/services > /dev/null
          sleep 5
          curl -sf http://127.0.0.1:3000/services > /dev/null

      # #326 の Performance ≥ 0.9 ゲートは /services（下層）で担保する。
      # トップ（/）は #420 で「粒子が集まって初めてロゴが浮かび上がる」演出を優先し、
      # 不透明オーバーレイ + 不可視ロゴにしたため、FCP/LCP は演出の尺（約 10 秒）そのものになる。
      # これはユーザーが実際に体験する時間と一致する正しい計測値であり、小手先の対策で
      # 誤魔化さない（詳細: documents/spec/top-particle-loader.md）。
      # 下層ページはローダーが軽量なため、バンドル肥大やレンダリング回帰はここで検知できる。
      - name: Lighthouse mobile performance (下層ページで性能ゲート)
        run: node scripts/lighthouse-check.mjs http://127.0.0.1:3000/services
        env:
          LIGHTHOUSE_MIN_PERFORMANCE: '0.9'
          LIGHTHOUSE_WARMUP_PASSES: '3'

      # トップは演出込みの実測値を「記録するだけ」。continue-on-error が必須 —
      # lighthouse-check.mjs は閾値未満で exit 1 するため、これが無いと宣言に反して
      # ハードゲートになる。トップの実測は 55 前後で、混雑した runner で 40 を割ると
      # 「ゲート対象外」と決めたページのスコアで無関係な PR がブロックされてしまう
      # （PR #419 2 巡目レビュー対応）。
      - name: Lighthouse mobile performance (トップ・演出込みの参考値／ゲートではない)
        continue-on-error: true
        run: node scripts/lighthouse-check.mjs http://127.0.0.1:3000/
        env:
          LIGHTHOUSE_MIN_PERFORMANCE: '0.4'
          LIGHTHOUSE_WARMUP_PASSES: '3'

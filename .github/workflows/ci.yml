name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit

      - name: Test
        run: npm test

      - name: Remove broken Microsoft apt repos
        run: |
          sudo find /etc/apt/sources.list.d/ \( -name "*.list" -o -name "*.sources" \) \
            -exec grep -l "packages.microsoft.com" {} \; \
            | xargs sudo rm -f 2>/dev/null || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          CI: true
          CONTACT_TRUST_PROXY_IP_HEADERS: 'true'

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Remove broken Microsoft apt repos
        run: |
          sudo find /etc/apt/sources.list.d/ \( -name "*.list" -o -name "*.sources" \) \
            -exec grep -l "packages.microsoft.com" {} \; \
            | xargs sudo rm -f 2>/dev/null || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start server
        run: npm run start -- -p 3000 &
        env:
          CI: true

      - name: Wait for server
        run: npx wait-on http://127.0.0.1:3000 --timeout 120000

      - name: Warm up server
        run: |
          curl -sf http://127.0.0.1:3000/ > /dev/null
          sleep 5
          curl -sf http://127.0.0.1:3000/ > /dev/null

      - name: Lighthouse mobile performance
        run: npm run lighthouse:check
        env:
          LIGHTHOUSE_MIN_PERFORMANCE: '0.7'
          LIGHTHOUSE_WARMUP_PASSES: '3'
